<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSAKATRADEPLAZA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000000;
            font-family: 'Archivo', system-ui, sans-serif;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
        }

        .title {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.1em;
            margin-bottom: 4.5rem;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 100%;
        }

        .link {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: white;
            text-decoration: none;
            transition: all 0.4s ease;
            padding: 6px 0;
        }

        .link:hover {
            text-decoration: underline;
            text-underline-offset: 8px;
            text-decoration-thickness: 2px;
        }

        /* Mobile adjustments */
        @media (max-width: 480px) {
            .title {
                margin-bottom: 3.8rem;
            }
            .link-list {
                gap: 1.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">OSAKATRADEPLAZA</h1>
        
        <div class="link-list">
            <a href="https://music.apple.com/" target="_blank" class="link">APPLE MUSIC</a>
            <a href="https://open.spotify.com/" target="_blank" class="link">SPOTIFY</a>
            <a href="https://music.163.com/" target="_blank" class="link">NETEASE</a>
            <a href="https://music.youtube.com/" target="_blank" class="link">YOUTUBE MUSIC</a>
            <a href="https://music.amazon.com/" target="_blank" class="link">AMAZON MUSIC</a>
            <a href="https://www.deezer.com/" target="_blank" class="link">DEEZER</a>
            <a href="https://tidal.com/" target="_blank" class="link">TIDAL</a>
            <a href="https://www.iheart.com/" target="_blank" class="link">IHEARTRADIO</a>
        </div>
    </div>
</body>
</html>
