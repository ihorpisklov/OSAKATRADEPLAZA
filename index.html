<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSAKATRADEPLAZA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000000;
            font-family: 'Archivo', system-ui, sans-serif;
            color: white;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            margin-bottom: 4.5rem;
            text-transform: uppercase;
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .link {
            font-size: 1.45rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .link:hover {
            color: #ffcc00;
            letter-spacing: 0.12em;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="link-list">

            <a href="https://music.163.com/" target="_blank" class="link">NETEASE</a>

    </div>
</body>
</html>
